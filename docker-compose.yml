services:

  db:
    image: postgres:16
    container_name: genz_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: genz_social
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d genz_social"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: genz_backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: genz_social
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: genz_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
